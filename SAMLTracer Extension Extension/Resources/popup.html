<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAML Tracer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap');

    :root {
      --bg: #0a0c10;
      --bg2: #0f1218;
      --bg3: #161b24;
      --border: #1e2535;
      --border2: #2a3347;
      --accent: #00d4aa;
      --accent2: #0088ff;
      --accent3: #ff6b35;
      --warn: #ffaa00;
      --danger: #ff3b5c;
      --success: #00d4aa;
      --text: #e2e8f4;
      --text2: #8b95a8;
      --text3: #4a5568;
      --request-color: #0088ff;
      --response-color: #00d4aa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 780px;
      height: 560px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-text {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 11px;
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
    }

    .badge.has-items {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text2);
      padding: 4px 10px;
      font-size: 11px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .btn:hover {
      border-color: var(--border2);
      color: var(--text);
      background: var(--border);
    }

    .btn.danger:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* Main layout */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar - request list */
    .sidebar {
      width: 220px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
    }

    .request-list {
      flex: 1;
      overflow-y: auto;
    }

    .request-list::-webkit-scrollbar { width: 4px; }
    .request-list::-webkit-scrollbar-track { background: transparent; }
    .request-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .request-item {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }

    .request-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: transparent;
      transition: background 0.15s;
    }

    .request-item:hover { background: var(--bg3); }

    .request-item.active {
      background: var(--bg3);
    }

    .request-item.active::before {
      background: var(--accent);
    }

    .request-item.type-request::before { background: var(--request-color); }
    .request-item.type-response.active::before { background: var(--response-color); }
    .request-item.type-request.active::before { background: var(--request-color); }

    .req-type {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .req-type.saml-request { color: var(--request-color); }
    .req-type.saml-response { color: var(--response-color); }
    .req-type.saml-logout { color: var(--warn); }

    .req-url {
      font-size: 10px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 3px;
    }

    .req-time {
      font-size: 9px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
    }

    .req-status {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    .req-status.success { background: var(--success); }
    .req-status.failure { background: var(--danger); }
    .req-status.unknown { background: var(--text3); }

    /* Detail panel */
    .detail {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text3);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }

    .tab:hover { color: var(--text2); }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .tab-content::-webkit-scrollbar { width: 4px; }
    .tab-content::-webkit-scrollbar-track { background: transparent; }
    .tab-content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      gap: 12px;
      padding: 40px;
    }

    .empty-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .empty-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text2);
    }

    .empty-desc {
      font-size: 12px;
      color: var(--text3);
      line-height: 1.6;
      max-width: 200px;
    }

    /* Claims grid */
    .claims-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .claim-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .claim-card:hover { border-color: var(--border2); }

    .claim-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }

    .claim-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.02em;
    }

    .claim-count {
      font-size: 10px;
      color: var(--text3);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    .claim-values {
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .claim-value {
      font-size: 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      padding: 4px 8px;
      background: var(--bg);
      border-radius: 4px;
      word-break: break-all;
    }

    /* Info sections */
    .info-section {
      margin-bottom: 16px;
    }

    .info-section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .info-rows {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .info-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .info-label {
      font-size: 11px;
      color: var(--text3);
      min-width: 110px;
      flex-shrink: 0;
      font-weight: 600;
      padding-top: 2px;
    }

    .info-value {
      font-size: 11px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      word-break: break-all;
      flex: 1;
      padding: 2px 6px;
      background: var(--bg2);
      border-radius: 3px;
    }

    .info-value.url { color: var(--accent2); }
    .info-value.issuer { color: var(--warn); }
    .info-value.nameid { color: var(--accent); }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .status-badge.success {
      background: rgba(0, 212, 170, 0.12);
      border: 1px solid rgba(0, 212, 170, 0.3);
      color: var(--success);
    }

    .status-badge.failure {
      background: rgba(255, 59, 92, 0.12);
      border: 1px solid rgba(255, 59, 92, 0.3);
      color: var(--danger);
    }

    /* XML view */
    .xml-container {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .xml-toolbar {
      display: flex;
      justify-content: flex-end;
      padding: 6px 10px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      gap: 6px;
    }

    .xml-content {
      padding: 12px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text2);
      max-height: 340px;
      overflow-y: auto;
    }

    .xml-content::-webkit-scrollbar { width: 4px; }
    .xml-content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* XML syntax highlighting */
    .xml-content .tag { color: #79c0ff; }
    .xml-content .attr-name { color: #ff9e64; }
    .xml-content .attr-value { color: #a8ff78; }
    .xml-content .text-content { color: var(--text); }
    .xml-content .comment { color: var(--text3); }

    /* Pulse animation for new items */
    @keyframes pulse-border {
      0% { border-color: var(--accent); }
      50% { border-color: transparent; }
      100% { border-color: var(--accent); }
    }

    .request-item.new {
      animation: pulse-border 0.8s ease 2;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: var(--text3);
      font-size: 12px;
      gap: 8px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* No-selection detail */
    .no-selection {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      gap: 12px;
      color: var(--text3);
      font-size: 12px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🔍</div>
    <span class="logo-text">SAML TRACER</span>
  </div>
  <div class="header-right">
    <span class="badge" id="countBadge">0 captured</span>
    <button class="btn danger" id="clearBtn">Clear</button>
  </div>
</div>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">Captured Messages</div>
    <div class="request-list" id="requestList">
      <div class="empty-state" id="sidebarEmpty">
        <div class="empty-icon">📡</div>
        <div class="empty-title">Listening…</div>
        <div class="empty-desc">Navigate to a page with SAML SSO to capture messages</div>
      </div>
    </div>
  </div>

  <!-- Detail Panel -->
  <div class="detail">
    <div class="tabs" id="tabsBar" style="display:none">
      <div class="tab active" data-tab="overview">Overview</div>
      <div class="tab" data-tab="claims">Claims</div>
      <div class="tab" data-tab="xml">Raw XML</div>
    </div>

    <div class="tab-content" id="detailContent">
      <div class="no-selection" id="noSelection">
        <span style="font-size:32px">👈</span>
        <span>Select a message to inspect</span>
      </div>

      <!-- Overview tab -->
      <div class="tab-panel active" id="tab-overview">
        <div id="overviewContent"></div>
      </div>

      <!-- Claims tab -->
      <div class="tab-panel" id="tab-claims">
        <div id="claimsContent"></div>
      </div>

      <!-- XML tab -->
      <div class="tab-panel" id="tab-xml">
        <div id="xmlContent"></div>
      </div>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
